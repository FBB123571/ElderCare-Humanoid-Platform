# 合成跌倒评测场景（几何特征序列，无需实机）
# label: normal | fall | near_fall

scenarios:
  - name: standing_normal
    label: normal
    frames:
      - {aspect: 1.15, dy: 0.0}
      - {aspect: 1.12, dy: 0.0}
      - {aspect: 1.10, dy: 0.0}

  - name: walking_normal
    label: normal
    frames:
      - {aspect: 1.05, dy: 0.05}
      - {aspect: 1.08, dy: -0.02}
      - {aspect: 1.10, dy: 0.03}

  - name: sit_down
    label: near_fall
    frames:
      - {aspect: 1.0, dy: -0.2}
      - {aspect: 0.85, dy: -0.15}
      - {aspect: 0.75, dy: -0.05}

  - name: sudden_fall
    label: fall
    frames:
      - {aspect: 1.1, dy: 0.0}
      - {aspect: 0.5, dy: -0.9}
      - {aspect: 0.32, dy: -0.1}
      - {aspect: 0.28, dy: 0.0}
      - {aspect: 0.30, dy: 0.0}

  - name: lying_still
    label: fall
    frames:
      - {aspect: 0.35, dy: 0.0}
      - {aspect: 0.33, dy: 0.0}
      - {aspect: 0.30, dy: 0.0}
      - {aspect: 0.30, dy: 0.0}
      - {aspect: 0.30, dy: 0.0}

  - name: bend_pickup
    label: near_fall
    frames:
      - {aspect: 1.0, dy: -0.25}
      - {aspect: 0.72, dy: -0.2}
      - {aspect: 0.85, dy: 0.15}
